[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "layer-registry"
version = "0.1.0"
description = "Layer-specific auto-registry for Python — inheritance is registration"
requires-python = ">=3.9"
dependencies = [
    "pydantic>=2.0,<3.0",
]

[project.optional-dependencies]
docstring = ["docstring-parser>=0.15"]
dev = [
    "pytest>=7.0",
    "pytest-cov>=4.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "--cov=layer_registry --cov-report=term-missing --tb=short -q"
